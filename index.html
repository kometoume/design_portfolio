<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>デザインポートフォリオ</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <p class="site-header__eyebrow">Design Portfolio</p>
      <h1>Design Works</h1>
      <p class="site-header__lead">
        これまで制作したデザインバナーや練習中の作品の一部です。カードをクリックすると制作意図や工程の詳細が見られます。
      </p>
    </header>

    <nav class="filter-nav" aria-label="作品カテゴリ">
      <button type="button" class="filter-btn is-active" data-filter="all">
        すべて
      </button>
      <button type="button" class="filter-btn" data-filter="yt-thumbnail">
        YouTubeサムネイル
      </button>
      <button type="button" class="filter-btn" data-filter="rich-menu">
        LINEリッチメニュー
      </button>
      <button type="button" class="filter-btn" data-filter="illustrator">
        Illustrator
      </button>
      <button type="button" class="filter-btn" data-filter="photoshop">
        Photoshop
      </button>
      <button type="button" class="filter-btn" data-filter="figma">
        Figma
      </button>
      <button type="button" class="filter-btn" data-filter="website">
        Webサイト
      </button>
    </nav>

    <main class="work-grid" id="workGrid">

      <!-- ============ YouTubeサムネイル ============ -->
      <article class="work-card" data-category="yt-thumbnail">
        <button type="button" class="work-card__trigger">
          <span class="work-card__image">
            <img
              src="images/yt-thumbnail/yt_profit_up.png"
              alt="YouTubeサムネイル（3Dキャラクター×高揚感訴求）"
              loading="lazy"
              decoding="async"
            />
          </span>
          <span class="work-card__meta">
            <span class="work-card__tag">YouTubeサムネイル</span>
            <span class="work-card__title"
              >YouTubeサムネイル（3Dキャラクター×高揚感訴求）</span
            >
          </span>
        </button>
        <template>
          <div class="modal__images">
            <img
              src="images/yt-thumbnail/yt_profit_up.png"
              alt="YouTubeサムネイル（3Dキャラクター×高揚感訴求）"
            />
          </div>
          <div class="modal__text">
            <h3>YouTubeサムネイル（3Dキャラクター×高揚感訴求）</h3>
            <p>
              <strong>制作意図:</strong>
              「成果が出た」という高揚感をひと目で伝えるため、生成AIで作成した3Dキャラクターイラストと、太いアウトライン文字を組み合わせたサムネイルです。
            </p>
            <p><strong>デザインポイント:</strong></p>
            <ul>
              <li>
                ガッツポーズと紙吹雪の演出で、動画を開く前からポジティブな結果を予感させる構成
              </li>
              <li>
                「利益爆増。」を大きな縁取り文字で配置し、小さいサムネイルサイズでも視認できるよう太さ・コントラストを強調
              </li>
              <li>
                サブコピーを白地に黒縁の帯で囲み、背景が明るい部分でも文字の可読性を確保
              </li>
            </ul>
          </div>
        </template>
      </article>

      <article class="work-card" data-category="yt-thumbnail">
        <button type="button" class="work-card__trigger">
          <span class="work-card__image">
            <img
              src="images/yt-thumbnail/yt_loss_warning.png"
              alt="YouTubeサムネイル（3Dキャラクター×警告訴求）"
              loading="lazy"
              decoding="async"
            />
          </span>
          <span class="work-card__meta">
            <span class="work-card__tag">YouTubeサムネイル</span>
            <span class="work-card__title"
              >YouTubeサムネイル（3Dキャラクター×警告訴求）</span
            >
          </span>
        </button>
        <template>
          <div class="modal__images">
            <img
              src="images/yt-thumbnail/yt_loss_warning.png"
              alt="YouTubeサムネイル（3Dキャラクター×警告訴求）"
            />
          </div>
          <div class="modal__text">
            <h3>YouTubeサムネイル（3Dキャラクター×警告訴求）</h3>
            <p>
              <strong>制作意図:</strong>
              「見逃すと損をする」という危機感をクリック前に伝えるため、驚いた表情のキャラクターと赤・黄色の警告色を組み合わせたサムネイルです。
            </p>
            <p><strong>デザインポイント:</strong></p>
            <ul>
              <li>
                「損してる？」を赤字・黄色フチで強調し、キャラクターの驚いた表情と連動させて緊張感を演出
              </li>
              <li>
                下部に紺地の帯を敷き、動画の具体的なテーマ（4月からの売れ筋）を補足情報として整理
              </li>
              <li>
                キャラクターを右側に大きく配置し、視線が左のコピーから右の表情へ流れる構成
              </li>
            </ul>
          </div>
        </template>
      </article>

      <!-- ============ LINEリッチメニュー ============ -->
      <article class="work-card" data-category="rich-menu">
        <button type="button" class="work-card__trigger">
          <span class="work-card__image">
            <img
              src="images/rich-menu/richmenu_medication.png"
              alt="LINEリッチメニュー（お薬予約・宅配・お問い合わせ）"
              loading="lazy"
              decoding="async"
            />
          </span>
          <span class="work-card__meta">
            <span class="work-card__tag">LINEリッチメニュー</span>
            <span class="work-card__title"
              >LINEリッチメニュー（大バナー＋3分割メニュー）</span
            >
          </span>
        </button>
        <template>
          <div class="modal__images">
            <img
              src="images/rich-menu/richmenu_medication.png"
              alt="LINEリッチメニュー（お薬予約・宅配・お問い合わせ）"
            />
          </div>
          <div class="modal__text">
            <h3>LINEリッチメニュー（大バナー＋3分割メニュー）</h3>
            <p>
              <strong>制作意図:</strong>
              LINE公式アカウントのトップメニューとして、最も使ってほしい「おくすり予約」を大きく上段に配置し、下段に補助的な3つの機能を並べた構成です。
            </p>
            <p><strong>デザインポイント:</strong></p>
            <ul>
              <li>
                上段の緑バナーで最重要アクションを1つに絞り込み、迷わずタップできる導線に
              </li>
              <li>
                下段はピンク・青・オレンジで機能ごとに色分けし、アイコン＋テキストで直感的に判別できるように設計
              </li>
              <li>
                角丸カードと余白の取り方を統一し、LINEのトーク画面に馴染むフラットなUIに調整
              </li>
            </ul>
          </div>
        </template>
      </article>

      <article class="work-card" data-category="rich-menu">
        <button type="button" class="work-card__trigger">
          <span class="work-card__image">
            <img
              src="images/rich-menu/richmenu_5grid.png"
              alt="LINEリッチメニュー（5分割メニュー構成）"
              loading="lazy"
              decoding="async"
            />
          </span>
          <span class="work-card__meta">
            <span class="work-card__tag">LINEリッチメニュー</span>
            <span class="work-card__title">LINEリッチメニュー（5分割メニュー構成）</span>
          </span>
        </button>
        <template>
          <div class="modal__images">
            <img
              src="images/rich-menu/richmenu_5grid.png"
              alt="LINEリッチメニュー（5分割メニュー構成）"
            />
          </div>
          <div class="modal__text">
            <h3>LINEリッチメニュー（5分割メニュー構成）</h3>
            <p>
              <strong>制作意図:</strong>
              利用頻度の高い5つの機能を均等に並べたグリッド型のリッチメニューです。上段2分割・下段3分割の変則グリッドで、情報量と押しやすさのバランスを取りました。
            </p>
            <p><strong>デザインポイント:</strong></p>
            <ul>
              <li>
                アイコンはすべて同じ線の太さ・トーンで統一し、5項目並んでも雑多に見えないよう整理
              </li>
              <li>
                各カード下部の色帯にラベルを乗せることで、アイコンだけでは伝わりにくい機能名を補足
              </li>
              <li>
                濃紺の背景で全体を引き締め、パステル系のカードとのコントラストで視認性を確保
              </li>
            </ul>
          </div>
        </template>
      </article>

      <article class="work-card" data-category="rich-menu">
        <button type="button" class="work-card__trigger">
          <span class="work-card__image">
            <img
              src="images/rich-menu/richmenu_gajumaru_a.png"
              alt="がじゅまる薬局 リッチメニュー案A（オレンジ×ブラック）"
              loading="lazy"
              decoding="async"
            />
          </span>
          <span class="work-card__meta">
            <span class="work-card__tag">LINEリッチメニュー</span>
            <span class="work-card__title"
              >がじゅまる薬局 リッチメニュー案（配色バリエーション）</span
            >
          </span>
        </button>
        <template>
          <div class="modal__images">
            <img
              src="images/rich-menu/richmenu_gajumaru_a.png"
              alt="配色案A：受付・オンライン服薬指導をオレンジ、マップをブラックに"
            />
            <img
              src="images/rich-menu/richmenu_gajumaru_b.png"
              alt="配色案B：受付をブラック、オンライン服薬指導・マップをオレンジに"
            />
            <img
              src="images/rich-menu/richmenu_gajumaru_c.png"
              alt="配色案C：オンライン服薬指導のみオレンジ、他をブラックに"
            />
          </div>
          <div class="modal__text">
            <h3>がじゅまる薬局 リッチメニュー案（配色バリエーション）</h3>
            <p>
              <strong>制作意図:</strong>
              調剤薬局「がじゅまる薬局」のLINE公式アカウント用リッチメニューです。「受付」「オンライン服薬指導」「マップ」の3機能を6分割グリッドで整理し、営業時間・処方箋受付・初回問診・チャットへの導線をまとめました。
            </p>
            <p><strong>デザインポイント:</strong></p>
            <ul>
              <li>
                上段をカテゴリ見出し、下段をアイコン＋詳細情報の2階層構成にし、情報量が多いメニューでも視線の流れを整理
              </li>
              <li>
                コーポレートカラーのオレンジとブラックの配分を3パターン検証し、どの組み合わせが最も視認性・優先度が伝わるかを比較検討
              </li>
              <li>
                家・鍵・処方箋・吹き出しなど機能に対応したアイコンを統一した線の太さで作成し、直感的に押せるボタンに
              </li>
            </ul>
          </div>
        </template>
      </article>

      <article class="work-card" data-category="rich-menu">
        <button type="button" class="work-card__trigger">
          <span class="work-card__image">
            <img
              src="images/rich-menu/richmenu_gajumaru_green.png"
              alt="がじゅまる薬局 リッチメニュー（グリーン基調・営業時間カレンダー）"
              loading="lazy"
              decoding="async"
            />
          </span>
          <span class="work-card__meta">
            <span class="work-card__tag">LINEリッチメニュー</span>
            <span class="work-card__title"
              >がじゅまる薬局 リッチメニュー（グリーン基調・営業時間カレンダー）</span
            >
          </span>
        </button>
        <template>
          <div class="modal__images">
            <img
              src="images/rich-menu/richmenu_gajumaru_green.png"
              alt="がじゅまる薬局 リッチメニュー（グリーン基調・営業時間カレンダー）"
            />
          </div>
          <div class="modal__text">
            <h3>がじゅまる薬局 リッチメニュー（グリーン基調・営業時間カレンダー）</h3>
            <p>
              <strong>制作意図:</strong>
              ロゴのグリーンを基調に、ブランドイメージを前面に出したリッチメニュー案です。営業時間を曜日別の記号（●／）で一覧表示し、電話番号・FAXとあわせて「お問い合わせ」「お薬予約」「オンライン服薬指導」の3導線を配置しました。
            </p>
            <p><strong>デザインポイント:</strong></p>
            <ul>
              <li>
                ロゴと同系色のグリーンを背景に採用し、ブランドカラーを強く印象づける配色に統一
              </li>
              <li>
                曜日ごとの営業時間を記号（●＝営業、／＝休診）で表現し、文字を読まなくても一目で判断できる時間割表に
              </li>
              <li>
                下段のボタンはくすみカラー＋アウトラインアイコンで統一し、上段の情報エリアと視覚的にトーンを分離
              </li>
            </ul>
          </div>
        </template>
      </article>

      <!-- ============ Illustrator ============ -->
      <article class="work-card" data-category="illustrator">
        <button type="button" class="work-card__trigger">
          <span class="work-card__image">
            <img
              src="images/flyer/flyer_sample.png"
              alt="A4フライヤーデザイン"
              loading="lazy"
              decoding="async"
            />
          </span>
          <span class="work-card__meta">
            <span class="work-card__tag">Illustrator</span>
            <span class="work-card__title"
              >A4フライヤーデザイン（写真加工 × パス上文字 × ツートン背景）</span
            >
          </span>
        </button>
        <template>
          <div class="modal__images">
            <img src="images/flyer/flyer_sample.png" alt="A4フライヤーデザイン" />
          </div>
          <div class="modal__text">
            <h3>A4フライヤーデザイン（写真加工 × パス上文字 × ツートン背景）</h3>
            <p>
              Adobe
              Illustratorを使用し、架空のクライアントから提供された写真・ロゴ・原稿をもとに
              <strong>実務のワークフローに沿って制作したA4サイズのフライヤー</strong
              >です。
              メインビジュアルのマスク処理、パスに沿った文字配置、背景のツートン加工など、
              フライヤー制作に必要な一連の操作を体系的に学びながらデザインしました。
            </p>
            <p><strong>制作手順・作業ポイント:</strong></p>
            <ul>
              <li>
                新規ドキュメントをCMYK／A4サイズで作成し、塗り足し用にパスのオフセット（3mm）を適用
              </li>
              <li>
                メイン写真を配置し、楕円形のクリッピングマスクで視線が集まる構図に調整
              </li>
              <li>
                パス上文字ツールを使用し、楕円パスの外周にキャッチコピーを弧状にレイアウト
              </li>
              <li>書体、文字詰め（カーニング・トラッキング）を調整し視認性を最適化</li>
              <li>
                詳細情報（住所・電話番号・メール・URL）は階層整理しセンター揃えで配置
              </li>
              <li>URLのみ別オブジェクトにし、太さ・文字サイズを変えて視線誘導を強化</li>
              <li>
                背景は「グリッドに分割」で上下2色のツートンにし、スポイトで写真の色から抽出
              </li>
              <li>
                全体の重心を「やや上」に寄せて余白を確保し、A4フライヤーとしてのバランスを調整
              </li>
            </ul>
            <p>
              写真の切り抜き、フォント選定、文字の読みやすさ、色の抽出など、
              <strong>実務のフライヤー制作に必要な工程を一通り経験した作品</strong
              >です。
            </p>
          </div>
        </template>
      </article>

      <article class="work-card" data-category="illustrator">
        <button type="button" class="work-card__trigger">
          <span class="work-card__image">
            <img
              src="images/logo/kuzure.png"
              alt="Illustrator 崩ロゴ"
              loading="lazy"
              decoding="async"
            />
          </span>
          <span class="work-card__meta">
            <span class="work-card__tag">Illustrator</span>
            <span class="work-card__title"
              >「崩」ロゴ（テクスチャ・クラウンツール練習）</span
            >
          </span>
        </button>
        <template>
          <div class="modal__images">
            <img src="images/logo/kuzure.png" alt="Illustrator 崩ロゴ" />
          </div>
          <div class="modal__text">
            <h3>「崩」ロゴ（テクスチャ・クラウンツール練習）</h3>
            <p>
              文字「崩」をモチーフに、Illustratorのテクスチャ処理やクラウンツールによる
              <strong>形状のランダム変形・ニュアンス調整</strong
              >を学ぶ目的で制作したロゴです。
              パスの基本操作に加え、質感表現や手描き風の揺らぎを加えることをテーマにしています。
            </p>
            <p><strong>学習ポイント:</strong></p>
            <ul>
              <li>クラウンツールを使用したアウトラインのランダム変形</li>
              <li>テクスチャ（グランジ系）の適用による質感づけ</li>
              <li>パスの微調整と太さのバランス調整</li>
              <li>文字ロゴとして視認性を保ちつつ、崩れ感を演出</li>
            </ul>
            <p>ふだんのロゴ制作とは異なる「崩す表現」を学ぶためのトレーニング作品です。</p>
          </div>
        </template>
      </article>

      <article class="work-card" data-category="illustrator">
        <button type="button" class="work-card__trigger">
          <span class="work-card__image">
            <img
              src="images/logo/design_logo.png"
              alt="Illustrator 練習ロゴ"
              loading="lazy"
              decoding="async"
            />
          </span>
          <span class="work-card__meta">
            <span class="work-card__tag">Illustrator</span>
            <span class="work-card__title">「DESIGN」ロゴ（パスファインダー練習）</span>
          </span>
        </button>
        <template>
          <div class="modal__images">
            <img src="images/logo/design_logo.png" alt="Illustrator 練習ロゴ" />
          </div>
          <div class="modal__text">
            <h3>「DESIGN」ロゴ（パスファインダー練習）</h3>
            <p>
              「DESIGN」の文字をモチーフに、Illustratorの基本操作に慣れるための
              トレーニングとして制作したロゴです。
              特定のブランドやコンセプトに基づくものではなく、
              <strong>パスファインダー・パスの編集・整列機能</strong>
              の基礎習得を目的としています。
            </p>
            <p><strong>学習ポイント:</strong></p>
            <ul>
              <li>パスファインダー（合体・分割・型抜き）による形状づくり</li>
              <li>文字のアウトライン化とパス調整によるロゴ化の基礎</li>
            </ul>
            <p>Illustratorの操作理解を深めるための基礎練習として制作しました。</p>
          </div>
        </template>
      </article>

      <article class="work-card" data-category="illustrator">
        <button type="button" class="work-card__trigger">
          <span class="work-card__image">
            <img
              src="images/cafe_menu.png"
              alt="カフェメニューデザイン"
              loading="lazy"
              decoding="async"
            />
          </span>
          <span class="work-card__meta">
            <span class="work-card__tag">Illustrator</span>
            <span class="work-card__title">カフェ メニュー表</span>
          </span>
        </button>
        <template>
          <div class="modal__images">
            <img src="images/cafe_menu.png" alt="カフェメニューデザイン" />
            <img src="images/cafe_menu2.png" alt="メニュー表 裏面" />
          </div>
          <div class="modal__text">
            <h3>カフェ メニュー表</h3>
            <p>
              <strong>制作意図:</strong>
              コーヒーのほか、様々なお茶をゆっくり楽しめるカフェのメニュー表として制作しました。
              「落ち着いた店内で、飲み物を選ぶ時間もくつろぎの一部になる」ことを意識しています。
            </p>
            <p>
              <strong>コンセプト:</strong>
              店内の落ち着いた雰囲気に合わせて、全体は余白を多めに残したシンプルなレイアウトに。
              パスのオフセットで余白を -15mm
              に設定することで、ゆったりとした余裕を感じさせる紙面構成としました。
            </p>
            <p><strong>デザインポイント:</strong></p>

    <!-- 画像モーダル -->
    <div class="modal" id="imageModal" aria-hidden="true">
      <div class="modal__overlay"></div>
      <div class="modal__content">
        <button class="modal__close" aria-label="閉じる">&times;</button>
        <div class="modal__body" id="modalBody"></div>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const modal = document.getElementById("imageModal");
        const modalBody = document.getElementById("modalBody");
        const closeBtn = document.querySelector(".modal__close");
        const overlay = document.querySelector(".modal__overlay");

        const openModal = (template) => {
          modalBody.innerHTML = "";
          modalBody.appendChild(template.content.cloneNode(true));
          modal.classList.add("is-active");
          modal.setAttribute("aria-hidden", "false");
        };

        const closeModal = () => {
          modal.classList.remove("is-active");
          modal.setAttribute("aria-hidden", "true");
          modalBody.innerHTML = "";
        };

        // カードクリックでモーダルに詳細を表示
        document.querySelectorAll(".work-card").forEach((card) => {
          const trigger = card.querySelector(".work-card__trigger");
          const template = card.querySelector("template");
          trigger.addEventListener("click", () => openModal(template));
        });

        closeBtn.addEventListener("click", closeModal);
        overlay.addEventListener("click", closeModal);

        document.addEventListener("keydown", (e) => {
          if (e.key === "Escape") {
            closeModal();
          }
        });

        // カテゴリフィルター
        const filterButtons = document.querySelectorAll(".filter-btn");
        const cards = document.querySelectorAll(".work-card");

        filterButtons.forEach((btn) => {
          btn.addEventListener("click", () => {
            filterButtons.forEach((b) => b.classList.remove("is-active"));
            btn.classList.add("is-active");

            const filter = btn.dataset.filter;
            cards.forEach((card) => {
              const show = filter === "all" || card.dataset.category === filter;
              card.style.display = show ? "" : "none";
            });
          });
        });
      });
    </script>
