    <main class="work-grid" id="workGrid">
      <!-- ============ Web広告・バナー ============ -->
      <article class="work-card" data-category="web-ad">
        <button type="button" class="work-card__trigger">
          <span class="work-card__image">
            <img
              src="images/web-ad/webad_typography.png"
              alt="Web広告バナー（タイポグラフィ訴求）"
              loading="lazy"
              decoding="async"
            />
          </span>
          <span class="work-card__meta">
            <span class="work-card__tag">Web広告・バナー</span>
            <span class="work-card__title"
              >Web広告バナー（タイポグラフィ×警告色訴求）</span
            >
          </span>
        </button>
        <template>
          <div class="modal__images">
            <img
              src="images/web-ad/webad_typography.png"
              alt="Web広告バナー（タイポグラフィ訴求）"
            />
          </div>
          <div class="modal__text">
            <h3>Web広告バナー（タイポグラフィ×警告色訴求）</h3>
            <p>
              <strong>制作意図:</strong>
              薬局経営者・法人代表者に向けて、期限が迫るテーマへの危機感と行動喚起を短時間で伝えるための正方形バナーです。
            </p>
            <p><strong>デザインポイント:</strong></p>
            <ul>
              <li>
                濃紺の背景にグラデーション文字とグラフ・矢印のモチーフを重ね、「利益を左右する」という訴求を視覚的に補強
              </li>
              <li>
                赤い帯で条件（対象者限定）を強調し、黄色のCTAボタンで視線の最終着地点を明確化
              </li>
              <li>
                文字のジャンプ率を大きく取り、SNS上でもひと目で要点が伝わるよう設計
              </li>
            </ul>
          </div>
        </template>
      </article>

      <article class="work-card" data-category="web-ad">
        <button type="button" class="work-card__trigger">
          <span class="work-card__image">
            <img
              src="images/web-ad/webad_seminar_16x9.png"

              loading="lazy"
              decoding="async"
            />
          </span>
          <span class="work-card__meta">
            <span class="work-card__tag">Web広告・バナー</span>
            <span class="work-card__title"
              >セミナー告知バナー（16:9・フォトコンポジション）</span
            >
          </span>
        </button>
        <template>
          <div class="modal__images">
            <img
              src="images/web-ad/webad_seminar_16x9.png"
              alt="セミナー告知バナー（フォトコンポジション）"
            />
          </div>
          <div class="modal__text">
            <h3>セミナー告知バナー（16:9・フォトコンポジション）</h3>
            <p>
              <strong>制作意図:</strong>
              オンラインセミナーの告知用バナーとして、白衣姿の人物写真と情報を左右に整理し、信頼感と開催情報の見やすさを両立させました。
            </p>
            <p><strong>デザインポイント:</strong></p>
            <ul>
              <li>
                左側にテキスト情報、右側に人物写真を配置し、視線誘導を意識したレイアウト
              </li>
              <li>
                帯（リボン）とベタ塗りブロックでタイトル・サブタイトル・日時の情報階層を明確化
              </li>
              <li>青系の配色で医療・健康分野らしい清潔感と信頼感を演出</li>
            </ul>
          </div>
        </template>
      </article>

      <article class="work-card" data-category="web-ad">
        <button type="button" class="work-card__trigger">
          <span class="work-card__image">

              decoding="async"
            />
          </span>
          <span class="work-card__meta">
            <span class="work-card__tag">Web広告・バナー</span>
            <span class="work-card__title"
              >Web広告バナー（イラストキャラクター訴求）</span
            >
          </span>
        </button>
        <template>
          <div class="modal__images">
            <img
              src="images/web-ad/webad_illustration.png"
              alt="Web広告バナー（イラストキャラクター訴求）"
            />
          </div>
          <div class="modal__text">
            <h3>Web広告バナー（イラストキャラクター訴求）</h3>
            <p>
              <strong>制作意図:</strong>
              「知らないと損をするかもしれない」という不安をやわらかく伝えるため、写実的な写真ではなくイラストキャラクターを主役にしたバナーです。
            </p>
            <p><strong>デザインポイント:</strong></p>
            <ul>
              <li>
                驚いた表情のキャラクターと下降矢印で「損失」のイメージを直感的に表現
              </li>
              <li>
                チェックリストのアイコンを添えて、内容が整理された情報であることを補足
              </li>
              <li>
                上部の帯・下部のCTAボタンで縦の視線の流れを作り、最後にボタンへ誘導する構成
              </li>
            </ul>
          </div>

          </span>
        </button>

          <div class="modal__images">
            <img

              alt="資料ダウンロード訴求バナー（アイコン・モックアップ）"
            />
          </div>
          <div class="modal__text">
            <h3>資料ダウンロード訴求バナー（アイコン×冊子モックアップ）</h3>
            <p>
              <strong>制作意図:</strong>
              無料配布資料のダウンロードを促すバナーとして、資料そのものの中身が伝わるよう表紙モックアップとアイコンを組み合わせました。
            </p>
            <p><strong>デザインポイント:</strong></p>
            <ul>
              <li>
                電卓・グラフ・薬のアイコンイラストで「調剤報酬」というテーマを視覚的に補足
              </li>
              <li>
                資料の表紙をモックアップ化し、もらえるものの内容を具体的にイメージさせる構成
              </li>
              <li>グリーン系のグラデーションで「無償提供」というポジティブな印象を演出</li>
            </ul>
          </div>
        </template>
      </article>

      <article class="work-card" data-category="web-ad">
        <button type="button" class="work-card__trigger">
          <span class="work-card__image">
            <img
              src="images/web-ad/webad_photo_alert.png"
              alt="Web広告バナー（フォト×警告訴求）"
              loading="lazy"

          </span>

        </button>

          </div>
          <div class="modal__text">
            <h3>速報告知バナー（フォト×警告訴求）</h3>
            <p>
              <strong>制作意図:</strong>
              制度改定の速報性と緊急性を伝えるため、悩む表情の人物写真と赤いCTAボタンを組み合わせ、「今すぐ確認したくなる」訴求を狙いました。
            </p>
            <p><strong>デザインポイント:</strong></p>
            <ul>
              <li>
                右側に大きく人物写真を配置し、左側の帯テキストとのコントラストで緊張感を演出
              </li>
              <li>半透明の黒帯でタイトル部分の可読性を確保しつつ背景の写真を活かす処理</li>
              <li>赤いCTAボタンを右下に配置し、情報を読み終えた視線の終着点に誘導</li>
            </ul>
          </div>
        </template>
      </article>

      <!-- ============ YouTubeサムネイル ============ -->

          <div class="modal__text">
            <h3>YouTubeサムネイル（3Dキャラクター×高揚感訴求）</h3>
            <p>
              <strong>制作意図:</strong>
              「成果が出た」という高揚感をひと目で伝えるため、生成AIで作成した3Dキャラクターイラストと、太いアウトライン文字を組み合わせたサムネイルです。
            </p>
            <p><strong>デザインポイント:</strong></p>
            <ul>
              <li>
                ガッツポーズと紙吹雪の演出で、動画を開く前からポジティブな結果を予感させる構成
              </li>
              <li>
                「利益爆増。」を大きな縁取り文字で配置し、小さいサムネイルサイズでも視認できるよう太さ・コントラストを強調
              </li>
              <li>
                サブコピーを白地に黒縁の帯で囲み、背景が明るい部分でも文字の可読性を確保
              </li>
            </ul>
          </div>
        </template>
      </article>

      <article class="work-card" data-category="yt-thumbnail">
        <button type="button" class="work-card__trigger">

          <span class="work-card__meta">
            <span class="work-card__tag">YouTubeサムネイル</span>

            >

        <template>
          <div class="modal__images">
            <img
              src="images/yt-thumbnail/yt_loss_warning.png"
              alt="YouTubeサムネイル（3Dキャラクター×警告訴求）"

          <div class="modal__text">
            <h3>YouTubeサムネイル（3Dキャラクター×警告訴求）</h3>
            <p>
              <strong>制作意図:</strong>
              「見逃すと損をする」という危機感をクリック前に伝えるため、驚いた表情のキャラクターと赤・黄色の警告色を組み合わせたサムネイルです。
            </p>
            <p><strong>デザインポイント:</strong></p>
            <ul>
              <li>
                「損してる？」を赤字・黄色フチで強調し、キャラクターの驚いた表情と連動させて緊張感を演出
              </li>
              <li>
                下部に紺地の帯を敷き、動画の具体的なテーマ（4月からの売れ筋）を補足情報として整理
              </li>
              <li>
                キャラクターを右側に大きく配置し、視線が左のコピーから右の表情へ流れる構成
              </li>
            </ul>
          </div>
        </template>
      </article>

      <!-- ============ LINEリッチメニュー ============ -->
      <article class="work-card" data-category="rich-menu">
        <button type="button" class="work-card__trigger">
          <span class="work-card__image">
            <img
              src="images/rich-menu/richmenu_medication.png"
              alt="LINEリッチメニュー（お薬予約・宅配・お問い合わせ）"
              loading="lazy"
              decoding="async"
            />
          </span>
          <span class="work-card__meta">
            <span class="work-card__tag">LINEリッチメニュー</span>
            <span class="work-card__title"
              >LINEリッチメニュー（大バナー＋3分割メニュー）</span
            >
          </span>
        </button>
        <template>
          <div class="modal__images">
            <img
              src="images/rich-menu/richmenu_medication.png"
              alt="LINEリッチメニュー（お薬予約・宅配・お問い合わせ）"
            />
          </div>
          <div class="modal__text">
            <h3>LINEリッチメニュー（大バナー＋3分割メニュー）</h3>
            <p>
              <strong>制作意図:</strong>
              LINE公式アカウントのトップメニューとして、最も使ってほしい「おくすり予約」を大きく上段に配置し、下段に補助的な3つの機能を並べた構成です。
            </p>
            <p><strong>デザインポイント:</strong></p>
            <ul>
              <li>
                上段の緑バナーで最重要アクションを1つに絞り込み、迷わずタップできる導線に
              </li>
              <li>
                下段はピンク・青・オレンジで機能ごとに色分けし、アイコン＋テキストで直感的に判別できるように設計
              </li>
              <li>
                角丸カードと余白の取り方を統一し、LINEのトーク画面に馴染むフラットなUIに調整
              </li>
            </ul>
          </div>
        </template>
      </article>

      <article class="work-card" data-category="rich-menu">
        <button type="button" class="work-card__trigger">
          <span class="work-card__image">
            <img
              src="images/rich-menu/richmenu_5grid.png"
              alt="LINEリッチメニュー（5分割メニュー構成）"
              loading="lazy"
              decoding="async"
            />
          </span>
          <span class="work-card__meta">
            <span class="work-card__tag">LINEリッチメニュー</span>
            <span class="work-card__title">LINEリッチメニュー（5分割メニュー構成）</span>
          </span>
        </button>
        <template>
          <div class="modal__images">
            <img
              src="images/rich-menu/richmenu_5grid.png"
              alt="LINEリッチメニュー（5分割メニュー構成）"
            />
          </div>
          <div class="modal__text">
            <h3>LINEリッチメニュー（5分割メニュー構成）</h3>
            <p>
              <strong>制作意図:</strong>
              利用頻度の高い5つの機能を均等に並べたグリッド型のリッチメニューです。上段2分割・下段3分割の変則グリッドで、情報量と押しやすさのバランスを取りました。
            </p>
            <p><strong>デザインポイント:</strong></p>
            <ul>
              <li>
                アイコンはすべて同じ線の太さ・トーンで統一し、5項目並んでも雑多に見えないよう整理
              </li>
              <li>
                各カード下部の色帯にラベルを乗せることで、アイコンだけでは伝わりにくい機能名を補足
              </li>
              <li>
                濃紺の背景で全体を引き締め、パステル系のカードとのコントラストで視認性を確保
              </li>
            </ul>
          </div>
        </template>
      </article>

      <!-- ============ Illustrator ============ -->
      <article class="work-card" data-category="illustrator">
        <button type="button" class="work-card__trigger">
          <span class="work-card__image">
            <img
              src="images/flyer/flyer_sample.png"
              alt="A4フライヤーデザイン"
              loading="lazy"

            />
          </span>
          <span class="work-card__meta">
            <span class="work-card__tag">Illustrator</span>
            <span class="work-card__title"
              >A4フライヤーデザイン（写真加工 × パス上文字 × ツートン背景）</span
            >
          </span>
        </button>
        <template>
          <div class="modal__images">
            <img src="images/flyer/flyer_sample.png" alt="A4フライヤーデザイン" />
          </div>
          <div class="modal__text">
            <h3>A4フライヤーデザイン（写真加工 × パス上文字 × ツートン背景）</h3>
            <p>
              Adobe
              Illustratorを使用し、架空のクライアントから提供された写真・ロゴ・原稿をもとに
              <strong>実務のワークフローに沿って制作したA4サイズのフライヤー</strong
              >です。
              メインビジュアルのマスク処理、パスに沿った文字配置、背景のツートン加工など、
              フライヤー制作に必要な一連の操作を体系的に学びながらデザインしました。
            </p>
            <p><strong>制作手順・作業ポイント:</strong></p>
            <ul>
              <li>
                新規ドキュメントをCMYK／A4サイズで作成し、塗り足し用にパスのオフセット（3mm）を適用
              </li>
              <li>
                メイン写真を配置し、楕円形のクリッピングマスクで視線が集まる構図に調整
              </li>
              <li>
                パス上文字ツールを使用し、楕円パスの外周にキャッチコピーを弧状にレイアウト
              </li>
              <li>書体、文字詰め（カーニング・トラッキング）を調整し視認性を最適化</li>
              <li>
                詳細情報（住所・電話番号・メール・URL）は階層整理しセンター揃えで配置
              </li>
              <li>URLのみ別オブジェクトにし、太さ・文字サイズを変えて視線誘導を強化</li>
              <li>
                背景は「グリッドに分割」で上下2色のツートンにし、スポイトで写真の色から抽出
              </li>
              <li>
                全体の重心を「やや上」に寄せて余白を確保し、A4フライヤーとしてのバランスを調整
              </li>
            </ul>
            <p>
              写真の切り抜き、フォント選定、文字の読みやすさ、色の抽出など、
              <strong>実務のフライヤー制作に必要な工程を一通り経験した作品</strong
              >です。
            </p>
          </div>
        </template>
      </article>

    <!-- 画像モーダル -->
    <div class="modal" id="imageModal" aria-hidden="true">
      <div class="modal__overlay"></div>
      <div class="modal__content">
        <button class="modal__close" aria-label="閉じる">&times;</button>
        <div class="modal__body" id="modalBody"></div>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const modal = document.getElementById("imageModal");
        const modalBody = document.getElementById("modalBody");
        const closeBtn = document.querySelector(".modal__close");
        const overlay = document.querySelector(".modal__overlay");

        const openModal = (template) => {
          modalBody.innerHTML = "";
          modalBody.appendChild(template.content.cloneNode(true));
          modal.classList.add("is-active");
          modal.setAttribute("aria-hidden", "false");
        };

        const closeModal = () => {
          modal.classList.remove("is-active");
          modal.setAttribute("aria-hidden", "true");
          modalBody.innerHTML = "";
        };

        // カードクリックでモーダルに詳細を表示
        document.querySelectorAll(".work-card").forEach((card) => {
          const trigger = card.querySelector(".work-card__trigger");
          const template = card.querySelector("template");
          trigger.addEventListener("click", () => openModal(template));
        });

        closeBtn.addEventListener("click", closeModal);
        overlay.addEventListener("click", closeModal);

        document.addEventListener("keydown", (e) => {
          if (e.key === "Escape") {
            closeModal();
          }
        });

        // カテゴリフィルター
        const filterButtons = document.querySelectorAll(".filter-btn");
        const cards = document.querySelectorAll(".work-card");

        filterButtons.forEach((btn) => {
          btn.addEventListener("click", () => {
            filterButtons.forEach((b) => b.classList.remove("is-active"));
            btn.classList.add("is-active");

            const filter = btn.dataset.filter;
            cards.forEach((card) => {
              const show = filter === "all" || card.dataset.category === filter;
              card.style.display = show ? "" : "none";
            });
          });
        });
      });
    </script>
