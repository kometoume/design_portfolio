<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Works | Michie Yagi</title>
<meta name="description" content="ChatGPT・Manusなど各種AIツールを活用して制作した漫画・動画・記事コンテンツの作品集です。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --text-main: #16161d;
    --text-sub: #6b6b76;
    --olive: #333d29;
    --coral: #e94846;
    --border: rgba(0,0,0,0.1);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
    background: var(--bg);
    color: var(--text-main);
    line-height: 1.8;
  }
  a { color: inherit; }
  .font-heading { font-family: 'Zen Maru Gothic', 'Noto Sans JP', sans-serif; }

  header {
    padding: 100px 6vw 60px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  header .eyebrow {
    display: block;
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--coral);
    margin-bottom: 16px;
  }
  header h1 {
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    font-weight: 700;
    margin: 0 0 14px;
    color: var(--olive);
  }
  header p {
    color: var(--text-sub);
    font-size: 0.95rem;
    max-width: 560px;
    margin: 0 auto;
  }
  header .back {
    display: inline-block;
    margin-top: 28px;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    color: var(--text-sub);
    text-decoration: none;
    border-bottom: 1px solid var(--border);
    padding-bottom: 2px;
  }
  header .back:hover { color: var(--olive); border-color: var(--olive); }

  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 70px 6vw 100px;
  }
  section { margin-bottom: 90px; }
  section:last-child { margin-bottom: 0; }

  .section-label {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 32px;
  }
  .section-label .num {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--coral);
    font-family: monospace;
  }
  .section-label h2 {
    font-size: 1.3rem;
    font-weight: 700;
    margin: 0;
    color: var(--olive);
  }

  .manga-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  .manga-wrap img {
    width: 100%;
    max-width: 480px;
    border-radius: 14px;
    border: 1px solid var(--border);
    box-shadow: 0 8px 24px rgba(0,0,0,0.06);
  }
  .manga-wrap figcaption {
    font-size: 0.85rem;
    color: var(--text-sub);
    text-align: center;
  }
  .manga-wrap figcaption a {
    color: var(--olive);
    text-decoration: underline;
  }

  .tweet-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 24px;
  }

  .note-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 16px;
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .note-list a {
    display: block;
    padding: 18px 20px;
    border: 1px solid var(--border);
    border-radius: 12px;
    text-decoration: none;
    font-size: 0.9rem;
    transition: border-color 0.25s ease, background 0.25s ease;
  }
  .note-list a:hover {
    border-color: var(--olive);
    background: rgba(51,61,41,0.04);
  }
  .note-list .tag {
    display: inline-block;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: #fff;
    background: var(--coral);
    padding: 2px 8px;
    border-radius: 20px;
    margin-bottom: 8px;
  }

  footer {
    text-align: center;
    padding: 50px 6vw;
    color: var(--text-sub);
    font-size: 0.75rem;
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>

<header>
  <span class="eyebrow font-heading">AI Works</span>
  <h1 class="font-heading">AIを活用したコンテンツ制作</h1>
  <p>ChatGPT・Manusなど各種AIツールを使って制作した漫画・動画・記事コンテンツをまとめています。</p>
</header>

<main>

  <section>
    <div class="section-label">

    </div>
    <figure class="manga-wrap">
      <img src="images/ai/ai-manga.png" alt="薬局あるある AI漫画" loading="lazy">
      <figcaption>
        ChatGPTで台本・構成を生成し、AIイラストで仕上げた4コマ漫画です。<br>
        <a href="https://x.com/yppp_yakkyoku/status/2019244593439498696/photo/1" target="_blank" rel="noopener noreferrer">Xの投稿を見る →</a>
      </figcaption>
    </figure>
  </section>

  <section>
    <div class="section-label">
      <span class="num">02</span>
      <h2 class="font-heading">AI動画</h2>
    </div>
    <div class="tweet-grid">
      <blockquote class="twitter-tweet">
        <a href="https://x.com/yppp_yakkyoku/status/2026854741930598406"></a>
      </blockquote>
      <blockquote class="twitter-tweet">
        <a href="https://x.com/yppp_yakkyoku/status/2026129961212588221"></a>
      </blockquote>
    </div>
  </section>

  <section>
    <div class="section-label">
      <span class="num">03</span>
      <h2 class="font-heading">note記事</h2>
    </div>
    <ul class="note-list">
      <li>
        <a href="https://note.com/ypppofficial/n/n3cdf0c49ca4a" target="_blank" rel="noopener noreferrer">
          <span class="tag">note</span><br>
          note記事 ①
        </a>
      </li>
      <li>
        <a href="https://note.com/ypppofficial/n/nfa6d673f1654" target="_blank" rel="noopener noreferrer">
          <span class="tag">note</span><br>
          note記事 ②
        </a>
      </li>
      <li>
        <a href="https://note.com/ypppofficial/n/n3a89764fb31f" target="_blank" rel="noopener noreferrer">
          <span class="tag">note</span><br>
          note記事 ③
        </a>
      </li>
      <li>
        <a href="https://note.com/ypppofficial/n/nf8f33c788faf" target="_blank" rel="noopener noreferrer">
          <span class="tag">note</span><br>
          note記事 ④
        </a>
      </li>
    </ul>
  </section>

</main>

<footer>© Michie Yagi — AI Works</footer>

</body>
</html>
