          <div class="modal__text">
            <h3>コーポレートサイト案</h3>
            <p>
              <strong>制作意図:</strong>
              「Walk with a
              smile.」をキャッチコピーに掲げる会社のコーポレートサイト案です。薬局・薬剤師向けのソリューション（あなたの薬局、薬局の右腕、セキュリティZERO、服薬管理指導AI）を軸に、ニュース・ブログ・採用情報までを1つのトップページに整理しました。
            </p>
            <p><strong>デザインポイント:</strong></p>
            <ul>
              <li>
                メインビジュアルにスライダーを採用し、企業理念「誰もが笑顔で歩み続けられる健康長寿社会の実現」を写真とキャッチコピーで訴求
              </li>
              <li>
                4つのソリューションをカード形式で並列表示し、製品ごとのステータス（NEW／Coming
                soon／導入予定）をバッジで視覚的に区別
              </li>
              <li>
                ニュース・アップデート・ブログ（Kenko
                Insight）をセクションごとに分け、情報の更新頻度や粒度に応じて表示形式を使い分け
              </li>
              <li>
                採用情報セクションでは新卒・中途を写真付きカードで並べ、コーポレートサイトとしての信頼感と親しみやすさを両立
              </li>
            </ul>
          </div>
        </template>
      </article>

        <template>
          <div class="modal__images">
            <img
              src="images/seminar/seminar_shienkin23man_lp.png"
              alt="セミナー告知バナー（最大23万円の支援金・緊急開催）"
            />
          </div>
          <div class="modal__text">
            <h3>セミナー告知バナー（最大23万円の支援金・緊急開催）</h3>
            <p>
              <strong>制作意図:</strong>
              薬局経営者向けに「最大23万円の支援金」制度をテーマにした緊急開催セミナーの告知バナーです。15分で理解できる短時間セミナーという手軽さと、支援金という具体的なメリットを両立して訴求しました。
            </p>
            <p><strong>デザインポイント:</strong></p>
            <ul>
              <li>
                赤地の「緊急開催」タグを最上部に置き、限られた開催期間（12/16・17・18）への即時性を演出
              </li>
              <li>
                「23」の数字と「支援金」をゴールドで強調し、他のテキストより視認性・訴求力を高める配色に
              </li>
              <li>
                斜めのカラー分割で人物写真とテキストエリアを分け、白衣姿の薬剤師の写真で信頼感を補強
              </li>
              <li>
                日時・時間をアイコン付きで整理し、「無料で参加する」ボタンを視線の着地点として最下部に配置
              </li>
            </ul>
          </div>
        </template>
      </article>

        <template>
          <div class="modal__images">
            <img
              src="images/flyer/flyer_tablet_4g_a4_omote.jpg"
              alt="A4チラシ（11インチ4Gタブレット無償提供）表面"
            />

          <div class="modal__text">
            <h3>A4チラシ（11インチ4Gタブレット無償提供）</h3>
            <p>
              <strong>制作意図:</strong>
              薬局向けに11インチ4Gタブレットを完全無償提供するキャンペーンのA4チラシ（表面）です。スペックの魅力と「無償」という条件を、情報を詰め込みすぎずに一目で伝えることを意識しました。
            </p>
            <p><strong>デザインポイント:</strong></p>
            <ul>
              <li>
                「11インチ」「2.5K」「90Hz」の3つのスペックを大きな数字で縦に並べ、キャッチコピー的に見せる構成
              </li>
              <li>
                クアッドスピーカー・バッテリー・セキュリティなど5つの機能をピクトグラム＋短い説明文で等間隔に整理
              </li>
              <li>
                紫のグラデーション帯で「累計申込数10,000薬局突破」「完全無償」を強調し、ページ内で最も視線が集まるゾーンに配置
              </li>
              <li>
                QRコードと申込フォームURLを下部にまとめ、チラシを見てすぐ行動できる導線を確保
              </li>
            </ul>
          </div>
        </template>
      </article>

      <article class="work-card" data-category="illustrator">
        <button type="button" class="work-card__trigger">

                <div class="carousel__slide">

              </div>

          <div class="modal__text">
            <h3>Web広告 A/Bテスト案（調剤報酬改定対策セミナー）</h3>
            <p>
              <strong>制作意図:</strong>
              薬局関係者限定の無料セミナー集客用Web広告として、訴求軸の異なる2パターンをA/Bテスト用に制作しました。1080×1080（SNS用正方形）・1200×628（ディスプレイ広告用）の2サイズをそれぞれ展開しています。
            </p>
            <p><strong>デザインポイント:</strong></p>
            <ul>
              <li>
                A案：紺の背景と右肩上がりの矢印グラフで「判断を誤ると来期の利益に響く」という危機感を訴求
              </li>
              <li>
                B案：白基調にチェックリスト形式で「確認すべき3点」を整理し、A案とは対照的に冷静・信頼感のあるトーンで訴求
              </li>
              <li>
                CTAボタン（「今、確認すべきポイントを見る」）はA・B共通のデザイン・文言にし、訴求軸の違いだけで反応率を比較できるよう設計
              </li>
              <li>
                サイズ違い（正方形／横長）でもレイアウト崩れが出ないよう、要素の優先順位を保ったまま組み替え
              </li>
            </ul>
          </div>
        </template>
      </article>

      <article class="work-card" data-category="illustrator">
        <button type="button" class="work-card__trigger">

        <template>
          <div class="modal__images">
            <img
              src="images/poster/poster_a1_kodomo_line_a.png"

          </div>
          <div class="modal__text">
            <h3>A1ポスター（お子さま連れ向け・LINE処方箋送信案内）</h3>
            <p>
              <strong>制作意図:</strong>
              薬局店頭に掲示するA1サイズ（841×594）のポスターです。小さなお子さま連れの方に向けて、来局前にLINEで処方箋を送っておくと待ち時間を減らせるという使い方を、店頭でも一目で理解できるように制作しました。
            </p>
            <p><strong>デザインポイント:</strong></p>
            <ul>
              <li>
                「お子さま連れの方へ」というリボン見出しと、ベビーカーを押す親子のイラストで、対象読者を瞬時に絞り込む構成
              </li>
              <li>
                LINEでの送信〜受け取り準備完了通知までの流れを、スマホ画面イラスト＋アイコンで直感的に説明
              </li>
              <li>
                「こんな時に便利！」の4パターン（待ち時間短縮・感染症対策・兄弟連れ・通知）を色分けカードで並べ、来局シーンごとのメリットを整理
              </li>
              <li>
                QRコードと友だち追加の案内を緑の枠で囲み、店頭で足を止めた人がその場で行動できる導線を最下部に配置
              </li>
            </ul>
          </div>
        </template>
      </article>

      <!-- ============ LINEリッチメニュー ============ -->

      <article class="work-card" data-category="figma">
        <button type="button" class="work-card__trigger">
          <span class="work-card__image">
            <img
              src="images/rich-menu/richmenu_5grid.png"
              alt="LINEリッチメニュー（5分割メニュー構成）"
              loading="lazy"
              decoding="async"
            />
          </span>
          <span class="work-card__meta">
            <span class="work-card__tag">Figma</span>
            <span class="work-card__title"
              >LINEリッチメニュー（5分割メニュー構成）</span
            >
          </span>
        </button>
        <template>
          <div class="modal__images">
            <img
              src="images/rich-menu/richmenu_5grid.png"
              alt="LINEリッチメニュー（5分割メニュー構成）"
            />
          </div>
          <div class="modal__text">
            <h3>LINEリッチメニュー（5分割メニュー構成）</h3>
            <p>
              <strong>制作意図:</strong>
              利用頻度の高い5つの機能を均等に並べたグリッド型のリッチメニューです。上段2分割・下段3分割の変則グリッドで、情報量と押しやすさのバランスを取りました。
            </p>
            <p><strong>デザインポイント:</strong></p>
            <ul>
              <li>
                アイコンはすべて同じ線の太さ・トーンで統一し、5項目並んでも雑多に見えないよう整理
              </li>
              <li>
                各カード下部の色帯にラベルを乗せることで、アイコンだけでは伝わりにくい機能名を補足
              </li>
              <li>
                濃紺の背景で全体を引き締め、パステル系のカードとのコントラストで視認性を確保
              </li>
            </ul>
          </div>
        </template>
      </article>

      <article class="work-card" data-category="figma">
        <button type="button" class="work-card__trigger">
          <span class="work-card__image">

            />
          </span>
          <span class="work-card__meta">
            <span class="work-card__tag">Figma</span>
            <span class="work-card__title"

            >
          </span>
        </button>
        <template>
          <div class="modal__images">
            <img
              src="images/rich-menu/richmenu_gajumaru_a.png"
              alt="配色案A：受付・オンライン服薬指導をオレンジ、マップをブラックに"
            />
          </div>
          <div class="modal__text">
            <h3>がじゅまる薬局 リッチメニュー案（配色バリエーション）</h3>
            <p>
              <strong>制作意図:</strong>
              調剤薬局「がじゅまる薬局」のLINE公式アカウント用リッチメニューです。「受付」「オンライン服薬指導」「マップ」の3機能を6分割グリッドで整理し、営業時間・処方箋受付・初回問診・チャットへの導線をまとめました。
            </p>
            <p><strong>デザインポイント:</strong></p>
            <ul>
              <li>
                上段をカテゴリ見出し、下段をアイコン＋詳細情報の2階層構成にし、情報量が多いメニューでも視線の流れを整理
              </li>
              <li>
                コーポレートカラーのオレンジとブラックの配分を3パターン検証し、どの組み合わせが最も視認性・優先度が伝わるかを比較検討
              </li>
              <li>
                家・鍵・処方箋・吹き出しなど機能に対応したアイコンを統一した線の太さで作成し、直感的に押せるボタンに
              </li>
            </ul>
          </div>
        </template>
      </article>

            >

        <template>
          <div class="modal__images">
            <img
              src="images/flyer/flyer_sample.png"
              alt="A4フライヤーデザイン"
            />
          </div>
          <div class="modal__text">
            <h3>
              A4フライヤーデザイン（写真加工 × パス上文字 × ツートン背景）
            </h3>
            <p>
              Adobe
              Illustratorを使用し、架空のクライアントから提供された写真・ロゴ・原稿をもとに
              <strong
                >実務のワークフローに沿って制作したA4サイズのフライヤー</strong
              >です。
              メインビジュアルのマスク処理、パスに沿った文字配置、背景のツートン加工など、
              フライヤー制作に必要な一連の操作を体系的に学びながらデザインしました。
            </p>
            <p><strong>制作手順・作業ポイント:</strong></p>
            <ul>
              <li>
                新規ドキュメントをCMYK／A4サイズで作成し、塗り足し用にパスのオフセット（3mm）を適用
              </li>
              <li>
                メイン写真を配置し、楕円形のクリッピングマスクで視線が集まる構図に調整
              </li>
              <li>
                パス上文字ツールを使用し、楕円パスの外周にキャッチコピーを弧状にレイアウト
              </li>
              <li>
                書体、文字詰め（カーニング・トラッキング）を調整し視認性を最適化
              </li>
              <li>
                詳細情報（住所・電話番号・メール・URL）は階層整理しセンター揃えで配置
              </li>
              <li>
                URLのみ別オブジェクトにし、太さ・文字サイズを変えて視線誘導を強化
              </li>
              <li>
                背景は「グリッドに分割」で上下2色のツートンにし、スポイトで写真の色から抽出
              </li>
              <li>
                全体の重心を「やや上」に寄せて余白を確保し、A4フライヤーとしてのバランスを調整
              </li>
            </ul>
            <p>
              写真の切り抜き、フォント選定、文字の読みやすさ、色の抽出など、
              <strong
                >実務のフライヤー制作に必要な工程を一通り経験した作品</strong
              >です。
            </p>
          </div>
        </template>
      </article>

    <!-- 画像モーダル -->
    <div class="modal" id="imageModal" aria-hidden="true">
      <div class="modal__overlay"></div>
      <div class="modal__content">
        <button class="modal__close" aria-label="閉じる">&times;</button>
        <div class="modal__body" id="modalBody"></div>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const modal = document.getElementById("imageModal");
        const modalBody = document.getElementById("modalBody");
        const closeBtn = document.querySelector(".modal__close");
        const overlay = document.querySelector(".modal__overlay");

        const initCarousels = (container) => {
          container.querySelectorAll(".carousel").forEach((carousel) => {
            const slides = carousel.querySelectorAll(".carousel__slide");
            const counter = carousel.querySelector(".carousel__counter");
            const prevBtn = carousel.querySelector(".carousel__btn--prev");
            const nextBtn = carousel.querySelector(".carousel__btn--next");
            let index = 0;

            const show = (i) => {
              index = (i + slides.length) % slides.length;
              slides.forEach((slide, slideIndex) => {
                slide.classList.toggle("is-active", slideIndex === index);
              });
              if (counter) {
                counter.textContent = `${index + 1} / ${slides.length}`;
              }
            };

            if (prevBtn) {
              prevBtn.addEventListener("click", () => show(index - 1));
            }
            if (nextBtn) {
              nextBtn.addEventListener("click", () => show(index + 1));
            }
            show(0);
          });
        };

        const openModal = (template) => {
          modalBody.innerHTML = "";
          modalBody.appendChild(template.content.cloneNode(true));
          initCarousels(modalBody);
          modal.classList.add("is-active");
          modal.setAttribute("aria-hidden", "false");
        };

        const closeModal = () => {
          modal.classList.remove("is-active");
          modal.setAttribute("aria-hidden", "true");
          modalBody.innerHTML = "";
        };

        // カードクリックでモーダルに詳細を表示
        document.querySelectorAll(".work-card").forEach((card) => {
          const trigger = card.querySelector(".work-card__trigger");
          const template = card.querySelector("template");
          trigger.addEventListener("click", () => openModal(template));
        });

        closeBtn.addEventListener("click", closeModal);
        overlay.addEventListener("click", closeModal);

        document.addEventListener("keydown", (e) => {
          if (e.key === "Escape") {
            closeModal();
          }
        });

        // カテゴリフィルター
        const filterButtons = document.querySelectorAll(".filter-btn");
        const cards = document.querySelectorAll(".work-card");

        filterButtons.forEach((btn) => {
          btn.addEventListener("click", () => {
            filterButtons.forEach((b) => b.classList.remove("is-active"));
            btn.classList.add("is-active");

            const filter = btn.dataset.filter;
            cards.forEach((card) => {
              const show = filter === "all" || card.dataset.category === filter;
              card.style.display = show ? "" : "none";
            });
          });
        });
      });
    </script>
